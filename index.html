<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contract Engine Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Mammoth.js for DOCX parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- PDF and Canvas libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              corporate: {
                900: '#0f172a', // Slate 900 - Professional Navy/Black
                800: '#1e293b', // Slate 800
                700: '#334155', // Slate 700
                50: '#f8fafc',  // Slate 50
              },
              accent: {
                500: '#0ea5e9', // Sky 500
                600: '#0284c7', // Sky 600
                700: '#0369a1', // Sky 700 - Darker accent for text
              }
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  color: theme('colors.slate.700'),
                  h1: { color: theme('colors.slate.900'), fontFamily: 'Playfair Display, serif', fontWeight: '700' },
                  h2: { color: theme('colors.slate.900'), fontFamily: 'Playfair Display, serif', fontWeight: '600' },
                  h3: { color: theme('colors.slate.900'), fontWeight: '600' },
                  strong: { color: theme('colors.slate.900'), fontWeight: '600' },
                  p: { color: theme('colors.slate.700') },
                  li: { color: theme('colors.slate.700') },
                },
              },
            }),
          },
        },
        plugins: [],
      }
    </script>
    <style>
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      .markdown-body ul {
        list-style-type: disc;
        padding-left: 1.25rem;
        margin-bottom: 1.25rem;
      }
      .markdown-body ol {
        list-style-type: decimal;
        padding-left: 1.25rem;
        margin-bottom: 1.25rem;
      }
      .markdown-body h1 {
        font-size: 1.875rem; /* 30px */
        line-height: 2.25rem;
        font-weight: 700;
        margin-top: 2rem;
        margin-bottom: 1rem;
        color: #0f172a;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 0.5rem;
        font-family: 'Playfair Display', serif;
      }
      .markdown-body h2 {
        font-size: 1.5rem; /* 24px */
        line-height: 2rem;
        font-weight: 600;
        margin-top: 1.75rem;
        margin-bottom: 0.75rem;
        color: #0f172a;
        font-family: 'Playfair Display', serif;
      }
      .markdown-body h3 {
        font-size: 1.25rem; /* 20px */
        line-height: 1.75rem;
        font-weight: 600;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
        color: #1e293b;
      }
      .markdown-body p {
        margin-bottom: 1rem;
        line-height: 1.75;
        color: #334155; 
        font-size: 1.05rem; /* Approx 16.8px - Perfect reading size */
        font-weight: 400; /* Regular weight for body */
      }
      .markdown-body li {
        margin-bottom: 0.5rem;
        line-height: 1.6;
        color: #334155;
        font-size: 1.05rem;
      }
      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1.5rem;
        font-size: 0.95rem; 
      }
      .markdown-body th, .markdown-body td {
        border: 1px solid #e2e8f0;
        padding: 0.75rem;
        text-align: left;
      }
      .markdown-body th {
        background-color: #f8fafc;
        font-weight: 600;
        color: #0f172a;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "remark-gfm": "https://aistudiocdn.com/remark-gfm@^4.0.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-800 antialiased font-sans">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
